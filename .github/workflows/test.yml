name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4.3.0

      - name: Set up Python
        uses: actions/setup-python@v5.7.0
        with:
          python-version: ${{ matrix.python-version }}

      # ── Linux ────────────────────────────────────────────────────────────────
      - name: Install iverilog + yosys (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y iverilog yosys

      # ── macOS ────────────────────────────────────────────────────────────────
      - name: Install iverilog + yosys (macOS)
        if: runner.os == 'macOS'
        run: brew install icarus-verilog yosys

      # ── Windows — iverilog via winget ─────────────────────────────────────
      - name: Install iverilog (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          winget install --id Icarus.Verilog --exact `
            --accept-source-agreements --accept-package-agreements --silent
          # Icarus Verilog installs to C:\iverilog\bin by default on CI runners
          $candidates = @(
            "C:\iverilog\bin",
            "C:\Program Files\iverilog\bin",
            "$env:ProgramFiles\iverilog\bin"
          )
          $iverDir = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iverDir) {
            # Fallback: search the entire Program Files tree
            $iverDir = (Get-ChildItem "C:\Program Files" -Recurse -Filter "iverilog.exe" `
                         -ErrorAction SilentlyContinue | Select-Object -First 1).DirectoryName
          }
          if ($iverDir) {
            Write-Host "Adding iverilog to PATH: $iverDir"
            Add-Content $env:GITHUB_PATH $iverDir
          } else {
            Write-Error "iverilog.exe not found after installation"
            exit 1
          }

      # ── Windows — yosys via MSYS2 / MINGW64 ─────────────────────────────
      - name: Set up MSYS2 + install yosys (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-yosys
          path-type: inherit

      # ── Windows — diagnóstico de PATH (correr antes de pip install) ───────
      - name: Verify EDA tools in PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "PATH=$env:PATH"
          Get-Command iverilog -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          Get-Command yosys -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source

      # ── Shared ───────────────────────────────────────────────────────────────
      - name: Install veriflow (editable)
        run: pip install -e ".[dev]"

      - name: Verify tools (veriflow doctor)
        run: python -m veriflow.cli doctor
        continue-on-error: ${{ runner.os == 'Windows' }}

      - name: Run pytest
        run: pytest veriflow/tests/ -q --tb=short
